name: Build iOS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
        flutter-version: '3.44.6'
        channel: stable
      - uses: maxim-lobanov/setup-xcode@v1
        with:
        xcode-version: '16'
      - name: Flutter pub get
        run: flutter pub get
      - name: Install CocoaPods
        run: cd ios && pod install --repo-update
      - name: Install fastlane
        run: sudo gem install fastlane --no-document
      - name: Download provisioning profile
        env:
        FASTLANE_USER: ${{ secrets.APPLE_ID }}
        FASTLANE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        TEAM_ID: "8SA58JW8NP"
        BUNDLE_ID: "app.greyNook.bb2026"
        run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cd ios
        fastlane sigh team_id:$TEAM_ID app_identifier:$BUNDLE_ID output_path:$RUNNER_TEMP/provisioning skip_install:false 2>&1 | tee $RUNNER_TEMP/sigh.txt
        PROFILE=$(find $RUNNER_TEMP/provisioning -name "*.mobileprovision" 2>/dev/null | head -1)
        if [ -n "$PROFILE" ]; then
          UUID=$(grep -ao '[A-F0-9]{8}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{12}' "$PROFILE" | head -1)
          cp "$PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "Profile installed: $UUID"
        fi
      - name: Build iOS
        env:
        TEAM_ID: "8SA58JW8NP"
        run: |
        cd ios
        xcodebuild \
          -workspace Runner.xcworkspace \
          -scheme Runner \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath $RUNNER_TEMP/app.xcarchive \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Development" \
          DEVELOPMENT_TEAM=$TEAM_ID \
          CODE_SIGNING_REQUIRED=NO \
        archive 2>&1 | tee $RUNNER_TEMP/build.txt
        BUILD_CODE=${PIPESTATUS[0]}
        if [ $BUILD_CODE -eq 0 ]; then
          echo "BUILD SUCCEEDED"
        else
          echo "BUILD FAILED"
          exit $BUILD_CODE
        fi
      - name: Export IPA
        run: |
        mkdir -p $RUNNER_TEMP/ipa
        cat > /tmp/export.plist << PLIST
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
        <key>method</key><string>development</string>
        <key>signingStyle</key><string>manual</string>
        <key>teamID</key><string>8SA58JW8NP</string>
        </dict>
        </plist>
        PLIST
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/app.xcarchive \
          -exportPath $RUNNER_TEMP/ipa \
          -exportOptionsPlist /tmp/export.plist 2>&1 | tee $RUNNER_TEMP/export.txt
        IPA=$(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1)
        if [ -n "$IPA" ]; then echo "IPA created"; else echo "NO IPA"; exit 1; fi
      - name: Upload
        run: mkdir -p build && find $RUNNER_TEMP/ipa -name "*.ipa" | head -1 | xargs -I{} cp {} build/Runner.ipa
      - uses: actions/upload-artifact@v4
        with:
        name: GreyNook-iOS
        path: build/Runner.ipa
