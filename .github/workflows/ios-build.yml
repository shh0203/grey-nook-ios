name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods --no-document

      - name: Create Flutter symlink
        run: |
          if [ ! -d /opt/flutter ]; then
            sudo mkdir -p /opt
            sudo ln -sfn $(dirname $(dirname $(readlink -f $(which flutter)))) /opt/flutter
          fi
          ls -la /opt/flutter/packages/flutter_tools/bin/podhelper.rb

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        run: |
          cd ios
          pod install
          cd ..

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD="build123"
          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          EXISTING=$(security list-keychains -d user | tr -d '"' | head -1)
          security list-keychains -d user -s $KEYCHAIN_PATH $EXISTING
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "OK: keychain created and unlocked"

      - name: Store Apple ID credentials in keychain
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          security delete-generic-password -s "$APPLE_ID" -a "$APPLE_ID" 2>/dev/null || true
          security add-generic-password -s "$APPLE_ID" -a "$APPLE_ID" -w "$APPLE_APP_PASSWORD"

      - name: Build iOS with explicit Team ID
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: "8SA58JW8NP"
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM=$TEAM_ID \
            archive
          cd ..

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>8SA58JW8NP</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath $RUNNER_TEMP/IPA \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates
          ls -la $RUNNER_TEMP/IPA/

      - name: Copy IPA to workspace
        run: |
          mkdir -p build
          find $RUNNER_TEMP/IPA -name "*.ipa" -exec cp {} build/Runner.ipa \;
          ls -la build/Runner.ipa

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreyNook-iOS
          path: build/Runner.ipa
          if-no-files-found: error
