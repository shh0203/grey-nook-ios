name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios && pod install --repo-update

      - name: Install fastlane
        run: sudo gem install fastlane --no-document

      - name: Download provisioning profile
        env:
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: "8SA58JW8NP"
          BUNDLE_ID: "app.greyNook.bb2026"
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cd ios
          fastlane sigh team_id:$TEAM_ID app_identifier:$BUNDLE_ID output_path:$RUNNER_TEMP/prov skip_install:false 2>&1 | tee $RUNNER_TEMP/sigh.txt
          PROF=$(find $RUNNER_TEMP/prov -name "*.mobileprovision" 2>/dev/null | head -1)
          if [ -n "$PROF" ]; then
            UUID=$(grep -ao '[A-F0-9]\{8\}-[A-F0-9]\{4\}-[A-F0-9]\{4\}-[A-F0-9]\{4\}-[A-F0-9]\{12\}' "$PROF" | head -1)
            cp "$PROF" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
            echo "Profile installed: ${UUID}"
          fi

      - name: Build iOS
        env:
          TEAM_ID: "8SA58JW8NP"
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGNING_REQUIRED=NO \
            archive 2>&1 | tee $RUNNER_TEMP/build.txt
          CODE=${PIPESTATUS[0]}
          if [ $CODE -eq 0 ]; then echo "BUILD OK"; else echo "BUILD FAILED"; exit $CODE; fi
          ls -la $RUNNER_TEMP/app.xcarchive

      - name: Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/ipa
          cat > /tmp/export.plist << 'PLISTEOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key><string>development</string>
  <key>signingStyle</key><string>manual</string>
  <key>teamID</key><string>8SA58JW8NP</string>
  <key>signingCertificate</key><string>Apple Development</string>
</dict>
</plist>
PLISTEOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist /tmp/export.plist \
            -allowProvisioningUpdates 2>&1 | tee $RUNNER_TEMP/export.txt
          IPA=$(find $RUNNER_TEMP/ipa -name "*.ipa" 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then echo "IPA: $IPA"; ls -la "$IPA"; else echo "NO IPA"; tail -10 $RUNNER_TEMP/export.txt; exit 1; fi

      - name: Upload
        run: |
          mkdir -p build
          IPA=$(find $RUNNER_TEMP/ipa -name "*.ipa" 2>/dev/null | head -1)
          if [ -n "$IPA" ] && [ -f "$IPA" ]; then
            cp "$IPA" build/Runner.ipa
            echo "Copied to build/Runner.ipa"
          else
            echo "ERROR: IPA not found"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: GreyNook-iOS
          path: build/Runner.ipa
          if-no-files-found: error
