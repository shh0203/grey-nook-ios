name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install dependencies
        run: |
          # Install Flutter dependencies first (generates Generated.xcconfig)
          flutter pub get

          # Install fastlane
          sudo gem install fastlane --no-document

          # Install CocoaPods dependencies
          cd ios
          pod install --repo-update
          cd ..

      - name: Fetch provisioning profile via fastlane sigh
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: "8SA58JW8NP"
          BUNDLE_ID: "app.greyNook.bb2026"
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Run fastlane sigh to download/create provisioning profile
          # sigh logs into App Store Connect with Apple ID credentials and fetches the profile
          cd ios
          fastlane sigh \
            username:"$APPLE_ID" \
            password:"$APPLE_APP_PASSWORD" \
            team_id:"$TEAM_ID" \
            app_identifier:"$BUNDLE_ID" \
            output_path:"$RUNNER_TEMP/provisioning_profiles" \
            skip_install:false \
            readonly:false 2>&1 | tee $RUNNER_TEMP/sigh_output.txt

          # Copy downloaded profile to Xcode's profile directory
          PROFILE=$(find $RUNNER_TEMP/provisioning_profiles -name "*.mobileprovision" 2>/dev/null | head -1)
          if [ -n "$PROFILE" ] && [ -f "$PROFILE" ]; then
            UUID=$(grep -A1 "UUID" "$PROFILE" | grep -o '[A-F0-9-]\{36\}' | head -1)
            cp "$PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
            echo "SUCCESS: Profile installed as ${UUID}.mobileprovision"
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          else
            echo "WARNING: sigh did not produce a .mobileprovision file"
            echo "sigh output:"
            tail -20 $RUNNER_TEMP/sigh_output.txt
          fi
          cd ..

      - name: Build iOS
        env:
          TEAM_ID: "8SA58JW8NP"
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM=$TEAM_ID \
            -allowProvisioningUpdates \
            archive 2>&1 | tee $RUNNER_TEMP/build_output.txt

          if [ \${PIPESTATUS[0]} -eq 0 ]; then
            echo "BUILD SUCCESS"
          else
            echo "BUILD FAILED - errors:"
            grep -E "error:" $RUNNER_TEMP/build_output.txt | grep -v "warning:" | head -15
          fi
          cd ..

      - name: Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/IPA

          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>development</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>8SA58JW8NP</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath $RUNNER_TEMP/IPA \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates

          ls -la $RUNNER_TEMP/IPA/

      - name: Upload IPA as artifact
        run: |
          mkdir -p build
          IPA_FILE=$(find $RUNNER_TEMP/IPA -name "*.ipa" | head -1)
          if [ -n "$IPA_FILE" ] && [ -f "$IPA_FILE" ]; then
            cp "$IPA_FILE" build/Runner.ipa
            echo "IPA ready: build/Runner.ipa"
          else
            echo "ERROR: No IPA found"
            ls -la $RUNNER_TEMP/IPA/
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: GreyNook-iOS
          path: build/Runner.ipa
          if-no-files-found: error
