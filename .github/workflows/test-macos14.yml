name: Test macOS 14

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'
      - name: Test
        run: |
          echo "macOS 14 works!"
          flutter --version
          xcodebuild -version
