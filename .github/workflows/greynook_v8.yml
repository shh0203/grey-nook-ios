name: GreyNook Build

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"
      - name: Flutter pub get
        run: flutter pub get
      - name: Pod install
        run: cd ios && pod install --repo-update
      - name: Fastlane install
        run: sudo gem install fastlane --no-document
      - name: Download provisioning profile
        env:
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cd ios
          fastlane sigh team_id:8SA58JW8NP app_identifier:app.greyNook.bb2026 development:1 output_path:$RUNNER_TEMP/prov skip_install:false 2>&1 | tee $RUNNER_TEMP/sigh.txt
          PROF=$(find $RUNNER_TEMP/prov -name "*.mobileprovision" 2>/dev/null | head -1)
          if [ -n "$PROF" ]; then UUID=$(grep -ao '[A-F0-9]{8}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{12}' "$PROF" | head -1); cp "$PROF" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision; echo "Profile installed: $UUID"; fi
      - name: Build
        env:
          TEAM_ID: "8SA58JW8NP"
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos -destination generic/platform=iOS -archivePath $RUNNER_TEMP/app.xcarchive CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Apple Development" DEVELOPMENT_TEAM=$TEAM_ID CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO archive 2>&1 | tee $RUNNER_TEMP/build.txt && echo "BUILD_SUCCESS"
      - name: Export
        run: mkdir -p $RUNNER_TEMP/ipa && xcodebuild -exportArchive -archivePath $RUNNER_TEMP/app.xcarchive -exportPath $RUNNER_TEMP/ipa -allowProvisioningUpdates 2>&1 | tee $RUNNER_TEMP/export.txt && ls $RUNNER_TEMP/ipa/ && echo "EXPORT_SUCCESS"
      - name: Upload
        run: mkdir -p build && cp $RUNNER_TEMP/ipa/Runner.ipa build/Runner.ipa && echo "UPLOAD_SUCCESS"
      - uses: actions/upload-artifact@v4
        with:
          name: GreyNook-iOS
          path: build/Runner.ipa
