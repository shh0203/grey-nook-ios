name: Get Apple Team ID

on: workflow_dispatch

jobs:
  query:
    runs-on: macos-15
    steps:
      - name: Query Apple for Team ID
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "=== Querying Apple for Team ID ==="
          xcrun altool --list-providers -u "$APPLE_ID" -p "$APPLE_APP_PASSWORD" 2>&1 | tee /tmp/team.txt
          echo ""
          echo "=== Looking for Team ID ==="
          TEAM_ID=$(xcrun altool --list-providers -u "$APPLE_ID" -p "$APPLE_APP_PASSWORD" 2>/dev/null | grep -E "Provider ID|Team ID" | head -1 | awk '{print $NF}')
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "Found Team ID: $TEAM_ID"
