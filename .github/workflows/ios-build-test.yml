name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Get Flutter dependencies
        run: flutter pub get

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Debug: Check Flutter and Pods
        run: |
          echo "=== Flutter Directory ==="
          ls -la ios/Flutter/
          echo ""
          echo "=== Debug.xcconfig ==="
          cat ios/Flutter/Debug.xcconfig
          echo ""
          echo "=== Generated.xcconfig ==="
          cat ios/Flutter/Generated.xcconfig 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== Run flutter pub get in ios ==="
          cd ios && /Users/runner/hostedtoolcache/flutter/stable-3.44.6-arm64/flutter/bin/flutter pub get 2>&1 | tail -5
          echo ""
          echo "=== After pub get, Flutter dir ==="
          ls -la ios/Flutter/

      - name: Run pod install
        run: |
          cd ios
          /Users/runner/hostedtoolcache/flutter/stable-3.44.6-arm64/flutter/bin/flutter build ios --simulator --debug 2>&1 | tee /tmp/flutter_build.log
          echo ""
          echo "=== EXIT CODE: $? ==="

      - name: Check build output
        run: |
          echo "=== ios/build directory ==="
          ls -la ios/build/ 2>/dev/null || echo "No build dir"
          ls -la ios/build/ios/ 2>/dev/null || echo "No ios subdir"
          ls -la ios/build/ios/iphonesimulator/ 2>/dev/null || echo "No simulator dir"
          echo ""
          echo "=== Flutter build log tail ==="
          tail -30 /tmp/flutter_build.log
