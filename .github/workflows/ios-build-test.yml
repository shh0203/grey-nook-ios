name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Get Flutter dependencies
        run: flutter pub get

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Build iOS
        run: |
          cd ios
          flutter build ios --debug --no-codesign 2>&1
        env:
          CODE_SIGNING_REQUIRED: 'NO'
          CODE_SIGNING_ALLOWED: 'NO'

      - name: Verify build output
        run: |
          if [ -d ios/build/ios/iphonesimulator/Runner.app ]; then
            echo "SUCCESS: Runner.app built for simulator"
          elif [ -d ios/build/ios/iphoneos ]; then
            echo "SUCCESS: iPhoneOS build found"
          else
            ls -la ios/build/ 2>/dev/null || echo "No build directory found"
            exit 1
          fi
