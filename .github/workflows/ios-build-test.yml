name: Build iOS

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios && pod install --repo-update

      - name: Install fastlane
        run: sudo gem install fastlane --no-document

      - name: Download provisioning profile
        env:
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cd ios
          fastlane sigh team_id:8SA58JW8NP app_identifier:app.greyNook.bb2026 skip_install:false 2>&1 | tee $RUNNER_TEMP/sigh.txt
          PROF=$(find $RUNNER_TEMP -name "*.mobileprovision" 2>/dev/null | head -1)
          if [ -n "$PROF" ]; then
            UUID=$(grep -ao '[A-F0-9]\{8\}-[A-F0-9]\{4\}-[A-F0-9]\{4\}-[A-F0-9]\{4\}-[A-F0-9]\{12\}' "$PROF" | head -1)
            [ -n "$UUID" ] && cp "$PROF" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision && echo "OK: $UUID"
          fi

      - name: Build iOS
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM=8SA58JW8NP \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive 2>&1 | tee $RUNNER_TEMP/build.txt
          CODE=${PIPESTATUS[0]}
          echo "Exit: $CODE"
          if [ $CODE -eq 0 ]; then
            echo "BUILD OK"
            ls -la $RUNNER_TEMP/app.xcarchive
          else
            grep -E "error:" $RUNNER_TEMP/build.txt | grep -v "warning:" | head -10
            exit $CODE
          fi

      - name: Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/ipa
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist /tmp/export.plist \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1 | tee $RUNNER_TEMP/export.txt
          IPA=$(find $RUNNER_TEMP/ipa -name "*.ipa" 2>/dev/null | head -1)
          if [ -n "$IPA" ] && [ -f "$IPA" ]; then
            echo "IPA: $IPA"
            mkdir -p build && cp "$IPA" build/Runner.ipa
          else
            echo "NO IPA"
            tail -5 $RUNNER_TEMP/export.txt
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: GreyNook-iOS
          path: build/Runner.ipa
          if-no-files-found: error
