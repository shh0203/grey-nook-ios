name: grey_nook
description: "Grey Nook — a private corner just for the two of us."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Local persistence (cache)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking / images
  cached_network_image: ^3.4.1
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  characters: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  # fonts left empty — system fonts on iOS / Android are used to keep the
  # first run lightweight. A custom font can be added in a follow-up cycle.
